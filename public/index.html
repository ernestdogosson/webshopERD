<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Create Product</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 40px auto; padding: 0 16px; }
    input { display: block; width: 100%; margin-bottom: 12px; padding: 8px; box-sizing: border-box; }
    button { padding: 10px 20px; cursor: pointer; }
    pre { background: #f4f4f4; padding: 12px; margin-top: 20px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h2>Create Product</h2>
  <form id="productForm">
    <input type="text" id="name" placeholder="Product name" required />
    <input type="number" id="price" placeholder="Price" required />
    <input type="number" id="stock" placeholder="Stock" required />
    <button type="submit">Create</button>
  </form>
  <pre id="result">Response will appear here...</pre>

  <script>
    document.getElementById("productForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const body = {
        name: document.getElementById("name").value,
        price: Number(document.getElementById("price").value),
        stock: Number(document.getElementById("stock").value),
      };
      try {
        const res = await fetch("/products", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-api-key": "supersecretadminkey",
          },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        document.getElementById("result").textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        document.getElementById("result").textContent = "Error: " + err.message;
      }
    });
  </script>
</body>
</html>
